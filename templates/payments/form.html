{% extends 'layouts/base.html' %}
{% block content %}
<div class="card shadow-sm border-0 rounded-4">
  <div class="card-body">
    <h3 class="mb-4">{{ 'Edit Payment' if payment else 'Add Payment' }}</h3>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <label class="form-label">Customer</label>
          <select class="form-select" name="customer_id" required>
            {% for customer in customers %}
            <option value="{{ customer.id }}" {% if payment and payment.customer_id == customer.id %}selected{% endif %}>{{ customer.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Date</label>
          <input class="form-control" type="date" name="payment_date" value="{{ payment.payment_date if payment else '' }}" required>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Amount</label>
          <input class="form-control" type="number" step="0.01" min="0" name="amount" value="{{ payment.amount if payment else '' }}" required inputmode="decimal">
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Payment Mode</label>
          <input class="form-control" name="payment_mode" value="{{ payment.payment_mode if payment else 'Cash' }}">
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea class="form-control" name="notes">{{ payment.notes if payment else '' }}</textarea>
        </div>
      </div>
      <div class="mobile-form-actions mt-4">
        <button class="btn btn-success">Save Payment</button>
        <a href="{{ url_for('payments.list_payments') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
