{% extends 'layouts/base.html' %}
{% block content %}
<div class="card shadow-sm border-0 rounded-4">
  <div class="card-body">
    <h3 class="mb-4">{{ 'Edit Customer' if customer else 'Add Customer' }}</h3>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <label class="form-label">Name</label>
          <input class="form-control" name="name" value="{{ customer.name if customer else '' }}" required>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Mobile</label>
          <input class="form-control" name="mobile" value="{{ customer.mobile if customer else '' }}" required inputmode="numeric" autocomplete="tel">
        </div>
        <div class="col-12">
          <label class="form-label">Address</label>
          <textarea class="form-control" name="address">{{ customer.address if customer else '' }}</textarea>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Milk Rate</label>
          <input class="form-control" type="number" step="0.01" min="0" name="milk_rate" value="{{ customer.milk_rate if customer else '' }}" inputmode="decimal">
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Opening Balance</label>
          <input class="form-control" type="number" step="0.01" name="opening_balance" value="{{ customer.opening_balance if customer else '' }}" inputmode="decimal">
        </div>
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="active" {{ 'checked' if not customer or customer.active else '' }}>
            <label class="form-check-label">Active</label>
          </div>
        </div>
      </div>
      <div class="mobile-form-actions mt-4">
        <button class="btn btn-success">Save Customer</button>
        <a href="{{ url_for('customers.list_customers') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
