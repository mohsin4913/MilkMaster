{% extends 'layouts/base.html' %}
{% block content %}
<div class="card shadow-sm border-0 rounded-4">
  <div class="card-body">
    <h3 class="mb-4">{{ 'Edit Expense' if expense else 'Add Expense' }}</h3>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <label class="form-label">Category</label>
          <select class="form-select" name="category">
            {% for category in ['Feed', 'Medicine', 'Veterinary', 'Labour', 'Electricity', 'Fuel', 'Maintenance', 'Other'] %}
            <option {% if expense and expense.category == category %}selected{% endif %}>{{ category }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Date</label>
          <input class="form-control" type="date" name="expense_date" value="{{ expense.expense_date if expense else '' }}" required>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Description</label>
          <input class="form-control" name="description" value="{{ expense.description if expense else '' }}" required>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Amount</label>
          <input class="form-control" type="number" step="0.01" min="0" name="amount" value="{{ expense.amount if expense else '' }}" required inputmode="decimal">
        </div>
      </div>
      <div class="mobile-form-actions mt-4">
        <button class="btn btn-success">Save Expense</button>
        <a href="{{ url_for('expenses.list_expenses') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
