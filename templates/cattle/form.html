{% extends 'layouts/base.html' %}
{% block content %}
<div class="card shadow-sm border-0 rounded-4">
  <div class="card-body">
    <h3 class="mb-4">{{ 'Edit Cattle' if cattle else 'Add Cattle' }}</h3>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="row g-3">
        <div class="col-12 col-md-6">
          <label class="form-label">Tag Number</label>
          <input class="form-control" name="tag_number" value="{{ cattle.tag_number if cattle else '' }}" required>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Name</label>
          <input class="form-control" name="name" value="{{ cattle.name if cattle else '' }}" required>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Breed</label>
          <input class="form-control" name="breed" value="{{ cattle.breed if cattle else '' }}">
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Gender</label>
          <input class="form-control" name="gender" value="{{ cattle.gender if cattle else '' }}">
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Date of Birth</label>
          <input class="form-control" type="date" name="date_of_birth" value="{{ cattle.date_of_birth if cattle else '' }}">
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Purchase Date</label>
          <input class="form-control" type="date" name="purchase_date" value="{{ cattle.purchase_date if cattle else '' }}">
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Purchase Cost</label>
          <input class="form-control" type="number" step="0.01" min="0" name="purchase_cost" value="{{ cattle.purchase_cost if cattle else '' }}" inputmode="decimal">
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Current Status</label>
          <select class="form-select" name="current_status">
            {% for status in ['Milking', 'Dry', 'Pregnant', 'Sick', 'Sold'] %}
            <option {% if cattle and cattle.current_status == status %}selected{% endif %}>{{ status }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="mobile-form-actions mt-4">
        <button class="btn btn-success">Save Cattle</button>
        <a href="{{ url_for('cattle.list_cattle') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
